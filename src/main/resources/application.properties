spring.application.name=admissions_management

# MariaDB datasource
# spring.datasource.url=jdbc:mariadb://darktide.tailc137e5.ts.net:3306/xettuyen2026
# spring.datasource.username=admissions
# spring.datasource.password=tanthienlang
spring.datasource.url=jdbc:mariadb://127.0.0.1:3305/mydatabase
spring.datasource.username=root
spring.datasource.password=phuc
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver


# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=2000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.auto_quote_keyword=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Web Server Configuration
server.port=8081
server.servlet.context-path=/admissions

# Web MVC view resolver
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
app.swing.admin-console.enabled=true
# Swing admin launcher
app.swing.enabled=true
spring.docker.compose.enabled=false
# Logging
logging.level.root=INFO
logging.level.com.example.admissions_management=DEBUG

# Disable DevTools automatic restart when running the Swing UI to avoid
# EntityManagerFactory being closed during long-running operations.
spring.devtools.restart.enabled=false
