spring.application.name=admissions_management

# Datasource: allow overriding via env/system properties; default to in-memory H2 for local runs
# To use MariaDB, set SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:localdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=2000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.auto_quote_keyword=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Web Server Configuration
server.port=${SERVER_PORT:8081}
server.servlet.context-path=/admissions

# Web MVC view resolver
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
app.swing.admin-console.enabled=true
# Swing admin launcher
app.swing.enabled=true
spring.docker.compose.enabled=false
# Logging
logging.level.root=INFO
logging.level.com.example.admissions_management=DEBUG

# Disable DevTools automatic restart when running the Swing UI to avoid
# EntityManagerFactory being closed during long-running operations.
spring.devtools.restart.enabled=false
