spring.application.name=admissions_management

# MariaDB datasource
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=admissions
spring.datasource.password=tanthienlang
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Web Server Configuration
server.port=8080
server.servlet.context-path=/admissions

# Web MVC view resolver
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
app.swing.admin-console.enabled=true
# Swing admin launcher
app.swing.enabled=true
spring.docker.compose.enabled=false
# Logging
logging.level.root=INFO
logging.level.com.example.admissions_management=DEBUG
