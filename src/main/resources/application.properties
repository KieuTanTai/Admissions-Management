spring.application.name=admissions_management

# MariaDB datasource
# Use file-based H2 to persist DB across restarts in local/dev
# Path './data/testdb' (relative to app working dir) will store the database files.
spring.datasource.url=jdbc:h2:file:./data/testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_UPPER=false;AUTO_SERVER=TRUE
spring.datasource.username=admissions
spring.datasource.password=tanthienlang
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=2000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.auto_quote_keyword=true

# Web Server Configuration
server.port=8081
server.servlet.context-path=/admissions

# Web MVC view resolver
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
app.swing.admin-console.enabled=true
# Swing admin launcher
app.swing.enabled=true
spring.docker.compose.enabled=false
# Logging
logging.level.root=INFO
logging.level.com.example.admissions_management=DEBUG

# Disable DevTools automatic restart when running the Swing UI to avoid
# EntityManagerFactory being closed during long-running operations.
spring.devtools.restart.enabled=false
