spring.application.name=admissions_management

# MariaDB datasource
spring.datasource.url=jdbc:mariadb://localhost:3306/mydatabase
spring.datasource.username=myuser
spring.datasource.password=secret
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Web Server Configuration
server.port=8080
server.servlet.context-path=/admissions

# Web MVC view resolver
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Swing admin launcher
app.swing.enabled=true

# Logging
logging.level.root=INFO
logging.level.com.example.admissions_management=DEBUG
