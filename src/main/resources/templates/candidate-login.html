<div class="container mt-4">
    <div class="card p-4">
        <h2>Đăng nhập thí sinh</h2>
        <form th:action="@{/candidate/login}" th:object="${lookupForm}" method="post">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">CCCD / Mã thí sinh</label>
                    <input type="text" th:field="*{username}" class="form-control" placeholder="TS_0001" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Ngày sinh</label>
                    <input type="text" th:field="*{password}" class="form-control" placeholder="25/07/2007" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Đăng nhập</button>
        </form>

        <div class="mt-3" th:if="${lookupResult != null}">
            <div class="alert" th:classappend="${lookupResult.found} ? ' alert-success' : ' alert-danger'">
                <span th:text="${lookupResult.message}"></span>
            </div>
        </div>
    </div>
</div>
