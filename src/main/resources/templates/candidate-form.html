<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Thí sinh</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        .card { border: 1px solid #d7d7d7; border-radius: 8px; padding: 18px; max-width: 760px; }
        .field { display: flex; flex-direction: column; margin-bottom: 12px; }
        label { font-weight: 600; margin-bottom: 5px; }
        input[type=text], select { width: 100%; padding: 8px 10px; border-radius: 4px; border: 1px solid #c1c1c1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
        button, .btn-link { cursor: pointer; padding: 10px 16px; border: none; border-radius: 4px; background: #2d6cdf; color: white; text-decoration: none; }
        .message { padding: 12px 14px; border-radius: 4px; margin-bottom: 16px; }
        .success { background: #e6f4ea; color: #1f6f3c; }
        .error { background: #fbe9e9; color: #a72f2f; }
    </style>
</head>

<body>
    <div class="card">
        <h1 th:text="${pageTitle}">Thí sinh</h1>

        <div th:if="${successMessage}" class="message success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="message error" th:text="${errorMessage}"></div>

        <form th:action="@{/admin/candidates/save}" th:object="${candidateForm}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="grid">
                <div class="field">
                    <label for="cccd">CCCD</label>
                    <input id="cccd" type="text" th:field="*{cccd}" required>
                </div>
                <div class="field">
                    <label for="soBaoDanh">Số báo danh</label>
                    <input id="soBaoDanh" type="text" th:field="*{soBaoDanh}">
                </div>
                <div class="field">
                    <label for="ho">Họ</label>
                    <input id="ho" type="text" th:field="*{ho}" required>
                </div>
                <div class="field">
                    <label for="ten">Tên</label>
                    <input id="ten" type="text" th:field="*{ten}" required>
                </div>
                <div class="field">
                    <label for="ngaySinh">Ngày sinh</label>
                    <input id="ngaySinh" type="text" th:field="*{ngaySinh}" placeholder="ddMMyyyy hoặc yyyy-MM-dd">
                </div>
                <div class="field">
                    <label for="gioiTinh">Giới tính</label>
                    <select id="gioiTinh" th:field="*{gioiTinh}">
                        <option value="">Chọn</option>
                        <option value="Nam">Nam</option>
                        <option value="Nu">Nữ</option>
                        <option value="Khac">Khác</option>
                    </select>
                </div>
                <div class="field">
                    <label for="dienThoai">Điện thoại</label>
                    <input id="dienThoai" type="text" th:field="*{dienThoai}">
                </div>
                <div class="field">
                    <label for="email">Email</label>
                    <input id="email" type="text" th:field="*{email}">
                </div>
                <div class="field">
                    <label for="noiSinh">Nơi sinh</label>
                    <input id="noiSinh" type="text" th:field="*{noiSinh}">
                </div>
                <div class="field">
                    <label for="doiTuong">Đối tượng</label>
                    <input id="doiTuong" type="text" th:field="*{doiTuong}">
                </div>
                <div class="field">
                    <label for="khuVuc">Khu vực</label>
                    <input id="khuVuc" type="text" th:field="*{khuVuc}">
                </div>
                <div class="field">
                    <label for="password">Mật khẩu</label>
                    <input id="password" type="text" th:field="*{password}">
                </div>
            </div>

            <div class="actions">
                <button type="submit">Lưu thí sinh</button>
                <a th:href="@{/admin/candidates}" class="btn-link">Quay về danh sách</a>
            </div>
        </form>
    </div>
</body>

</html>
